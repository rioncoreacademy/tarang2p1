name: Publish Docker Image

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - .github/workflows/publish-image.yml
      - Dockerfile
      - entrypoint.sh
      - chipcraft-run.sh
      - novnc-index.html
      - tools/chipcraft-key-init.sh
      - tools/chipcraft-tree.sh
      - tools/chipcraft-decrypt-all.sh
      - tools/chipcraft-sweep.sh
      - tools/chipcraft-crypt.vim

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/chipcraft
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v1.0,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
