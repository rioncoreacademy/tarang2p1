name: Publish Docker Image

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - .github/workflows/publish-image.yml
      - Dockerfile
      - entrypoint.sh
      - tarang2p1-run.sh
      - novnc-index.html
      - novnc-rebrand.js
      # Glob instead of an explicit per-file list -- the previous list
      # (individual tools/*.sh entries) silently missed several files the
      # Dockerfile actually COPYs in (watermark.py, git-wrapper.sh,
      # pre-commit, tarang2p1-gitignore, tarang2p1-lockscreen.sh), and the
      # background/font assets weren't watched at all. Globbing the whole
      # tools/ dir plus the asset extensions the Dockerfile COPYs means new
      # files added later are covered automatically instead of needing this
      # list updated every time.
      - tools/**
      - "*.png"
      - "*.ttf"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # cache-to=type=gha (below) needs the docker-container buildx driver.
      # Without this step, buildx falls back to the default `docker` driver,
      # which errors outright on cache export: "Cache export is not
      # supported for the docker driver."
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tarang2p1
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions runners are ephemeral — without an explicit cache,
          # Docker's layer cache never carries over between runs, so every
          # push re-ran apt-get install (huge package list, i386 multiarch)
          # and re-downloaded the OSS CAD Suite from scratch even for a
          # one-line script edit near the bottom of the Dockerfile. Those
          # layers come before any COPY of frequently-changed files (tools/*,
          # entrypoint.sh), so caching them via the gha backend should make
          # most future builds skip straight to the last few cheap layers.
          cache-from: type=gha
          cache-to: type=gha,mode=max
