name: Publish Docker Image

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - .github/workflows/publish-image.yml
      - Dockerfile
      - entrypoint.sh
      - tarang2-dp1-run.sh
      - novnc-index.html
      - tools/tarang2-dp1-key-init.sh
      - tools/tarang2-dp1-tree.sh
      - tools/tarang2-dp1-decrypt-all.sh
      - tools/tarang2-dp1-sweep.sh
      - tools/tarang2-dp1-crypt.vim
      - tools/tarang2-dp1-vim-wrapper.sh
      - tools/tarang2-dp1-refresh-github-ips.sh
      - tools/tarang2-dp1-github-ssh-setup.sh
      - novnc-rebrand.js

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # cache-to=type=gha (below) needs the docker-container buildx driver.
      # Without this step, buildx falls back to the default `docker` driver,
      # which errors outright on cache export: "Cache export is not
      # supported for the docker driver."
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tarang2-dp1
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions runners are ephemeral — without an explicit cache,
          # Docker's layer cache never carries over between runs, so every
          # push re-ran apt-get install (huge package list, i386 multiarch)
          # and re-downloaded the OSS CAD Suite from scratch even for a
          # one-line script edit near the bottom of the Dockerfile. Those
          # layers come before any COPY of frequently-changed files (tools/*,
          # entrypoint.sh), so caching them via the gha backend should make
          # most future builds skip straight to the last few cheap layers.
          cache-from: type=gha
          cache-to: type=gha,mode=max
