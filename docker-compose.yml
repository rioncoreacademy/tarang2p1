name: nvr

services:

  api:
    build: ./api
    ports:
      - "80:8000"
    environment:
      GH_CLIENT_ID:     ${GH_CLIENT_ID}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET}
      TEMPLATE_REPO:        ${TEMPLATE_REPO:-rioncoreacademy/tarang2p1-files}
      NOVNC_IMAGE:          ubuntu-novnc:latest
      VNC_PASSWORD:         ${VNC_PASSWORD:-novnc}
      CHIPCRAFT_KEY:        ${CHIPCRAFT_KEY}
      SHARED_PATH:          ${SHARED_PATH:-/data/workspace/project}
      SESSION_TTL:          ${SESSION_TTL:-14400}
      PORT_START:           ${PORT_START:-6081}
      PORT_END:             ${PORT_END:-6180}
      LICENSE_API_BASE_URL: ${LICENSE_API_BASE_URL:-}
      LICENSE_KEY:          ${LICENSE_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Read-only: this server's machine-id is what LICENSE_KEY gets locked
      # to for this whole deployment (see api/main.py _server_license_fingerprint).
      - /etc/machine-id:/etc/machine-id:ro
    restart: unless-stopped

  # This service is never started — it exists only so "docker compose build"
  # produces the ubuntu-novnc:latest image that the API spawns dynamically.
  novnc:
    build: .
    image: ubuntu-novnc:latest
    profiles: ["build-only"]
